# Shared RabbitMQ credentials for worker, producer, and KEDA scalers.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: keda-poc
type: Opaque
stringData:
  username: poc
  password: poc
  # In-cluster short hostname (worker, producer in keda-poc)
  amqp-url: "amqp://poc:poc@rabbitmq:5672//"
  # FQDN for KEDA operator (runs in keda namespace)
  amqp-url-fqdn: "amqp://poc:poc@rabbitmq.keda-poc.svc.cluster.local:5672/"
  http-url-fqdn: "http://poc:poc@rabbitmq.keda-poc.svc.cluster.local:15672/%2F"
