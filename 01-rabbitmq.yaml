apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-conf
  namespace: keda-poc
data:
  rabbitmq.conf: |
    loopback_users = none
    management.load_definitions = /etc/rabbitmq/definitions/definitions.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-definitions
  namespace: keda-poc
data:
  definitions.json: |
    {
      "vhosts": [
        {
          "name": "/"
        }
      ],
      "users": [
        {
          "name": "poc",
          "password_hash": "3QG9qpFO6/2eJSiMWw9HeYn1XvPwKkeIhJmUdqB6S5CCmu5V",
          "hashing_algorithm": "rabbit_password_hashing_sha256",
          "tags": ["administrator"]
        }
      ],
      "permissions": [
        {
          "user": "poc",
          "vhost": "/",
          "configure": ".*",
          "write": ".*",
          "read": ".*"
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: keda-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4.2-management
          ports:
            - containerPort: 5672   # Celery workers (AMQP)
            - containerPort: 15672  # KEDA scaler (HTTP management API)
          volumeMounts:
            - name: conf
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
              readOnly: true
            - name: definitions
              mountPath: /etc/rabbitmq/definitions
              readOnly: true
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: conf
          configMap:
            name: rabbitmq-conf
        - name: definitions
          configMap:
            name: rabbitmq-definitions
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: keda-poc
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
