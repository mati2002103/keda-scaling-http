apiVersion: batch/v1
kind: Job
metadata:
  name: producer
  namespace: keda-poc
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z rabbitmq 5672; do
                echo "waiting for rabbitmq:5672..."
                sleep 2
              done
      containers:
        - name: producer
          image: celery-poc:local
          imagePullPolicy: IfNotPresent
          # 16 tasks = 4 pods (16/4). Each pod concurrency=4 -> all picked fast.
          # Result: ready=0, unacked=16 while tasks run 1-3 min.
          command: ["python", "producer.py", "51"]
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: amqp-url
